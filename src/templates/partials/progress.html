{% if poll >= 300 %}
<div class="flex items-center justify-center gap-2 py-3 text-sm text-red-500">
    <i class="fa-solid fa-circle-exclamation"></i><span>다운로드 시간이 초과되었습니다. 다시 시도해주세요.</span>
</div>
{% else %}
<div hx-get="/download/status/{{ task_id }}?poll={{ poll + 1 }}" hx-trigger="every 2s" hx-target="#progress-container" hx-swap="innerHTML">
    <div class="flex justify-between text-xs text-neutral-500 mb-1.5">
        <span>{% if status == "pending" or progress == 0 %}다운로드 준비 중...{% else %}다운로드 진행 중...{% endif %}</span>
        <span>{% if progress == 0 %}...{% else %}{{ progress }}%{% endif %}</span>
    </div>
    {% if progress > 0 %}
    <div class="w-full h-2 bg-neutral-100 rounded-full overflow-hidden">
        <div class="h-full bg-neutral-900 rounded-full transition-all" style="width:{{ progress }}%"></div>
    </div>
    {% else %}
    <div class="w-full h-2 bg-neutral-100 rounded-full overflow-hidden">
        <div class="h-full bg-neutral-400 rounded-full animate-pulse w-full"></div>
    </div>
    {% endif %}
</div>
{% endif %}
