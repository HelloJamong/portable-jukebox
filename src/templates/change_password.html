{% extends "base.html" %}
{% block title %}비밀번호 변경{% endblock %}
{% block content %}
<div class="min-h-screen flex items-center justify-center bg-neutral-50">
    <div class="w-full max-w-sm p-8 bg-white border border-neutral-200 rounded-2xl shadow-sm">
        <h1 class="text-xl font-bold mb-1">비밀번호 변경</h1>
        <p class="text-sm text-neutral-500 mb-6">최초 로그인 시 비밀번호를 변경해야 합니다.</p>

        {% if error %}
        <div class="mb-4 px-4 py-3 bg-red-50 border border-red-200 rounded-xl text-sm text-red-600">
            <i class="fa-solid fa-circle-exclamation mr-1.5"></i>{{ error }}
        </div>
        {% endif %}

        <form method="post" action="/change-password" class="space-y-4">
            <div>
                <label class="block text-xs font-medium mb-1.5 text-neutral-500">현재 비밀번호</label>
                <input name="current_password" type="password" required autofocus
                    class="w-full px-4 py-2.5 bg-neutral-50 border border-neutral-200 rounded-lg text-sm focus:outline-none focus:ring-1 focus:ring-neutral-400">
            </div>
            <div>
                <label class="block text-xs font-medium mb-1.5 text-neutral-500">새 비밀번호</label>
                <input name="new_password" type="password" required
                    class="w-full px-4 py-2.5 bg-neutral-50 border border-neutral-200 rounded-lg text-sm focus:outline-none focus:ring-1 focus:ring-neutral-400">
            </div>
            <div>
                <label class="block text-xs font-medium mb-1.5 text-neutral-500">새 비밀번호 확인</label>
                <input name="confirm_password" type="password" required
                    class="w-full px-4 py-2.5 bg-neutral-50 border border-neutral-200 rounded-lg text-sm focus:outline-none focus:ring-1 focus:ring-neutral-400">
            </div>
            <button type="submit"
                class="w-full py-2.5 bg-neutral-900 text-white rounded-lg text-sm font-medium hover:bg-neutral-800 transition-colors">
                변경하기
            </button>
        </form>
    </div>
</div>
{% endblock %}
